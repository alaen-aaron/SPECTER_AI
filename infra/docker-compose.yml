# SPECTER_AI — local development stack (SRS §12.1)
#
# Services: postgres, redis, minio (object storage), api (FastAPI),
# worker (Celery), beat (Celery scheduler), frontend (Vite dev server).
#
# `worker` and `beat` share the exact same image as `api` — only the
# container `command` differs — so there is one Dockerfile to maintain
# for all three backend processes.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: specter
      POSTGRES_PASSWORD: specter
      POSTGRES_DB: specter
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U specter -d specter"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: specter
      MINIO_ROOT_PASSWORD: specter-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://specter:specter@postgres:5432/specter
      REDIS_URL: redis://redis:6379/0
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
    ports:
      - "8000:8000"
    volumes:
      - ../backend/app:/app/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: celery -A app.infrastructure.celery_app.app worker --loglevel=info
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://specter:specter@postgres:5432/specter
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ../backend/app:/app/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: celery -A app.infrastructure.celery_app.app beat --loglevel=info
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://specter:specter@postgres:5432/specter
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ../backend/app:/app/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ../frontend/src:/app/src
      - ../frontend/index.html:/app/index.html
    depends_on:
      - api

volumes:
  postgres_data:
  minio_data:
